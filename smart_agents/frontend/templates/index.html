<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Chat</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    #chat { max-width: 600px; margin: 0 auto; }
    .msg { padding: 10px 15px; margin: 8px 0; border-radius: 12px; }
    .user { background: #e0f7fa; color: #006064; align-self: flex-end; }
    .assistant { background: #f1f8e9; color: #33691e; }
    .assistant.loading { opacity: 0.6; font-style: italic; }
  </style>
</head>
<body>
  <div id="chat">
    {% for msg in history %}
      <div class="msg {{msg.role}}">{{msg.content}}</div>
    {% endfor %}
  </div>
  <form id="askForm">
    <input type="text" name="task" placeholder="Ask something..." autocomplete="off" required>
    <button type="submit">Send</button>
  </form>

  <script>
    const form = document.getElementById('askForm');
    const chat = document.getElementById('chat');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const formData = new FormData(form);
      const task = formData.get('task');

      // Show user message immediately
      const userDiv = document.createElement('div');
      userDiv.className = 'msg user';
      userDiv.textContent = task;
      chat.appendChild(userDiv);
      form.reset();

      // Stream assistant response using fetch and ReadableStream
      const response = await fetch('/ask', {
        method: 'POST',
        body: formData
      });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let done = false;
      let buffer = '';

      // Add loading indicator
      const loadingDiv = document.createElement('div');
      loadingDiv.id = 'loadingIndicator';
      loadingDiv.className = 'assistant loading';
      loadingDiv.textContent = 'Processing…';
      chat.appendChild(loadingDiv);

      while (!done) {
        const { value, done: doneReading } = await reader.read();
        done = doneReading;
        buffer += decoder.decode(value, { stream: true });
        // SSE messages are separated by double newlines
        const parts = buffer.split('\n\n');
        for (let i = 0; i < parts.length - 1; i++) {
          const line = parts[i].trim();
          if (line.startsWith('data:')) {
            const data = JSON.parse(line.slice(5).trim());
            const assistantDiv = document.createElement('div');
            assistantDiv.className = 'msg assistant';
            assistantDiv.innerHTML = marked.parse(data.content);
            chat.appendChild(assistantDiv);
          }
        }
        buffer = parts[parts.length - 1];
      }
      // After loop ends, process any remaining buffer
      if (buffer.trim().startsWith('data:')) {
        const data = JSON.parse(buffer.trim().slice(5).trim());
        const assistantDiv = document.createElement('div');
        assistantDiv.className = 'msg assistant';
        assistantDiv.innerHTML = marked.parse(data.content);
        chat.appendChild(assistantDiv);
      }
      // Close the stream
      reader.releaseLock();

      // After loop ends, remove loading indicator
      loadingDiv.remove();
    });
  </script>
</body>
</html>
