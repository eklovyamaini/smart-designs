# doc_to_confluence/example_config.yaml
#
# Migration configuration: maps Word document sections → Confluence targets.
#
# ── Environment variable substitution ──────────────────────────────────────
# Use ${VAR_NAME} in any string value to substitute environment variables.
# Recommended for credentials:
#   export CONFLUENCE_API_TOKEN="ATATT3x..."
#   export CONFLUENCE_USER="user@example.com"
#
# ── LLM task ordering ───────────────────────────────────────────────────────
# Tasks always run in this fixed order (only include the ones you want):
#   reformat → summarize → plantuml_diagram → confluence_format
# 'confluence_format' must always be the LAST task if included.
#
# ── LLM options ─────────────────────────────────────────────────────────────
#   expand_tables_to_pages : when true, every table in the matched section AND
#     all of its subsections is split into one Confluence page per data row.
#     Each page shows the row transposed into a 2-column header/value table
#     (column 1 = original header, column 2 = cell value) and is nested under
#     the section's own Confluence page.  Use confluence.row_page_title to
#     control the page title (supports {col_0}, {col_1}, … placeholders).
#
# ── match_type options ──────────────────────────────────────────────────────
#   heading          : matches heading text (case-insensitive regex search)
#   regex            : same as heading but makes intent explicit
#   custom_delimiter : matches paragraphs that act as custom section markers
#   table            : targets the first standalone table in the document

